# =============================================================================
# NOTAS DE CAMBIO (revisión 2026-07-09) — para discutir con el autor original.
# Cada cambio está marcado inline con "CAMBIO(n)" y, cuando se sustituye algo,
# el valor original se conserva comentado con el prefijo "ORIGINAL:".
#
# CAMBIO(1) Autenticación: el login deja el JWT en cookie httpOnly "token"
#   (src/controllers/auth.controller.js:23), pero el middleware activo
#   (verifyAdmin, src/middlewares/auth.middleware.js:36) lee el header
#   Authorization Bearer. Se documentan AMBOS esquemas (BearerAuth y
#   CookieAuth) como alternativas. >> DISCUTIR: elegir uno y borrar el otro.
# CAMBIO(2) /auth/login: OpenAPI ignora los parámetros llamados
#   "Authorization"; se sustituye por un securityScheme propio (FirebaseToken).
# CAMBIO(3) Los POST de creación devuelven 201 en el backend
#   (res.status(201) en los controladores), no 200. DELETE se queda en 200
#   porque el backend devuelve body.
# CAMBIO(4) Se documentan las respuestas 401 (endpoints protegidos) y 404
#   (endpoints /{id}) que faltaban, como respuestas reutilizables en
#   components.responses.
# CAMBIO(5) Se añaden esquemas tipados Evento y Cliente (copiados de los
#   modelos Prisma en src/models/) y wrappers *Response para tipar "data".
#   Espacio y Ponente quedan como TODO: aún no hay modelo ni ruta en backend.
# CAMBIO(6) Las respuestas que solo tenían "description" ahora declaran
#   content con su esquema.
# CAMBIO(7) /upload: en el backend está protegido con verifyAdmin y las rutas
#   reales son /upload/ponente/imagen, /upload/ponente/presentacion y
#   /upload/documento (src/routes/upload.route.js). >> DISCUTIR: sincronizar
#   el spec con las rutas reales.
# NOTA(8)   Las rutas de eventos y clientes NO aplican hoy ningún middleware
#   de autenticación en el backend, aunque el spec declara seguridad.
#   >> DISCUTIR: aplicar verifyAdmin/authenticate o quitar security del spec.
# CAMBIO(9) NUEVOS endpoints (PROPUESTA, aún sin implementar en backend) para
#   el flujo del bot de Telegram del ponente:
#     - GET  /ponentes/{id_ponente}/eventos-activos
#     - GET  /ponentes/{id_ponente}/eventos/{id_evento}/contexto-telegram
#     - POST /ponentes/{id_ponente}/telegram
#     - POST /alertas-ponente
#     - GET  /ponentes/{id_ponente}/eventos/{id_evento}/documentos
#     - POST /ponentes/{id_ponente}/eventos/{id_evento}/documentos
#   Incluyen esquemas nuevos: ContextoTelegram, AlertaPonente y
#   DocumentoPonente. >> DISCUTIR: nombres de ruta, campos y auth del bot.
#   Tras CAMBIO(10), el contexto-telegram se construye agregando la entidad
#   Ponencia de Raúl (no hacen falta tablas nuevas de hotel/viaje).
# CAMBIO(10) Se fusionan los endpoints de openapi_raul.yaml (v0.1.0, autor
#   Raúl) para Lumen (Agente 04 — Copilot): /salas, /presupuestos, /estados y
#   /ponencias. Se les aplican las convenciones de esta revisión (201 en POST,
#   401/404 reutilizables, requestBody en PATCH, CookieAuth), conservando sus
#   valores originales comentados como "ORIGINAL(raul)".
#   ACORDADO: los billetes se gestionan según el modelo de Raúl — campos
#   billete_ida_link / billete_vuelta_link de la Ponencia — y NO como
#   DocumentoPonente: se retira "billete" del enum de documentos y el
#   contexto-telegram los expone leyéndolos de la ponencia.
#   NOTA: sus campos usan snake_case (nombre_sala, id_espacio) frente al
#   camelCase de Prisma (clienteId) — >> DISCUTIR unificación de nomenclatura.
# =============================================================================

openapi: "3.0.3"
info:
  title: API Proyecto Tripulaciones
  description: API backend del ERP de Eventos
  # CAMBIO(10) — ORIGINAL: "0.0.1" (esta rama) / "0.1.0" (rama de Raúl)
  version: "0.2.0"

servers:
  - url: http://localhost:3000/api/v1
    description: Desarrollo local
  # CAMBIO: añadir la URL de producción cuando exista, p. ej.:
  # - url: https://<pendiente>/api/v1
  #   description: Producción

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    # CAMBIO(1): el login deja el JWT en la cookie httpOnly "token";
    # se documenta como alternativa al Bearer hasta decidir un único mecanismo.
    CookieAuth:
      type: apiKey
      in: cookie
      name: token
    # CAMBIO(2): esquema dedicado para el token de Firebase usado en /auth/login.
    FirebaseToken:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID token

  # CAMBIO(4): respuestas de error reutilizables (401/404) que faltaban.
  responses:
    Unauthorized:
      description: No autenticado (token ausente o inválido)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    OkResponse:
      type: object
      properties:
        ok: { type: boolean, example: true }
        msg: { type: string, example: "Has accedido a obtener todos los eventos" }
        filters: { type: object } # NOTA: los listados del backend devuelven "meta: { total }", no "filters" — ¿unificar?
        data: { type: object }

    ErrorResponse:
      type: object
      properties:
        ok: { type: boolean, example: false }
        msg: { type: string, example: "Evento no encontrado" }

    ValidationError:
      type: object
      properties:
        ok: { type: boolean, example: false }
        msg: { type: string, example: "Error de validacion" }
        errors:
          type: array
          items:
            type: object
            properties:
              msg: { type: string }
              path: { type: string }
              type: { type: string }

    UUID:
      type: string
      format: uuid
      example: bdfe40ca-70e8-4fe6-8907-df4a5a7bd3e6

    # CAMBIO(5): esquema tipado según src/models/eventos.prisma.
    Evento:
      type: object
      properties:
        id: { $ref: "#/components/schemas/UUID" }
        nombre: { type: string, example: "Feria de empleo tech" }
        descripcion: { type: string, nullable: true }
        completado: { type: boolean, default: false }
        clienteId: { $ref: "#/components/schemas/UUID" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # CAMBIO(5): esquema tipado según src/models/clientes.prisma.
    Cliente:
      type: object
      properties:
        id: { $ref: "#/components/schemas/UUID" }
        nombre: { type: string, example: "Acme S.L." }
        correo: { type: string, format: email }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # CAMBIO(5): wrappers para tipar "data" en las respuestas.
    EventoResponse:
      allOf:
        - $ref: "#/components/schemas/OkResponse"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/Evento" }
    EventoListResponse:
      allOf:
        - $ref: "#/components/schemas/OkResponse"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/Evento" }
    ClienteResponse:
      allOf:
        - $ref: "#/components/schemas/OkResponse"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/Cliente" }
    ClienteListResponse:
      allOf:
        - $ref: "#/components/schemas/OkResponse"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/Cliente" }
    # TODO CAMBIO(5): definir esquemas Espacio y Ponente cuando existan
    # los modelos en el backend (hoy no hay .prisma ni rutas para ellos).

    # CAMBIO(9): esquemas nuevos para el flujo del bot de Telegram (PROPUESTA).
    # Los campos son una primera aproximación — >> DISCUTIR con backend.
    ContextoTelegram:
      type: object
      description: Toda la información logística que el bot envía al ponente en una sola llamada. CAMBIO(10) — se construye agregando la Ponencia de Raúl (hotel, transporte, billetes) con su sala/espacio.
      properties:
        hotel: # CAMBIO(10): mapea a nombre_hotel / localizacion_hotel / checkin_horario de Ponencia
          type: object
          properties:
            nombre: { type: string }
            direccion: { type: string }
            checkIn: { type: string, format: date-time }
            checkOut: { type: string, format: date-time }
            confirmacion: { type: string, description: "Código de reserva" }
        viaje: # CAMBIO(10): mapea a nota_transporte / horario_ida_transporte / horario_vuelta_transporte de Ponencia
          type: object
          properties:
            medio: { type: string, example: "tren" }
            origen: { type: string }
            destino: { type: string }
            salida: { type: string, format: date-time }
            llegada: { type: string, format: date-time }
            localizador: { type: string }
        # CAMBIO(10) — ACORDADO: los billetes se exponen desde la Ponencia
        # (billete_ida_link / billete_vuelta_link, modelo de Raúl); NO son
        # DocumentoPonente.
        billetes:
          type: object
          properties:
            ida: { type: string, format: uri, description: "billete_ida_link de la ponencia" }
            vuelta: { type: string, format: uri, description: "billete_vuelta_link de la ponencia" }
        taxi:
          type: object
          properties:
            recogida: { type: string, format: date-time }
            lugar: { type: string }
            contacto: { type: string }
        horario:
          type: array
          description: Agenda del ponente dentro del evento
          items:
            type: object
            properties:
              hora: { type: string, format: date-time }
              actividad: { type: string }
        lugar:
          type: object
          properties:
            nombre: { type: string }
            direccion: { type: string }
            sala: { type: string }
        documentacion:
          type: array
          description: Documentos del ponente, sin contar billetes (ver CAMBIO(10))
          items: { $ref: "#/components/schemas/DocumentoPonente" }
        timeline:
          type: array
          description: Hitos ordenados del evento para el ponente
          items:
            type: object
            properties:
              fecha: { type: string, format: date-time }
              hito: { type: string }

    # CAMBIO(9)
    AlertaPonente:
      type: object
      properties:
        id: { $ref: "#/components/schemas/UUID" }
        ponenteId: { $ref: "#/components/schemas/UUID" }
        eventoId: { $ref: "#/components/schemas/UUID" }
        tipo:
          type: string
          enum: [urgencia, incidencia, consulta]
        mensaje: { type: string }
        estado:
          type: string
          enum: [abierta, en_curso, resuelta]
          default: abierta
        createdAt: { type: string, format: date-time }

    # CAMBIO(9)
    DocumentoPonente:
      type: object
      properties:
        id: { $ref: "#/components/schemas/UUID" }
        tipo:
          type: string
          # CAMBIO(10) — ORIGINAL: enum: [billete, agenda, presentacion, otro]
          # ACORDADO: los billetes se gestionan en la Ponencia (billete_*_link, modelo de Raúl).
          enum: [agenda, presentacion, otro]
        nombre: { type: string, example: "agenda-evento.pdf" }
        url:
          type: string
          format: uri
          description: URL devuelta por /upload (Cloudinary)
        origen:
          type: string
          enum: [telegram, panel]
          default: telegram
        createdAt: { type: string, format: date-time }

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: [] # CAMBIO(4): se marca explícitamente como endpoint público
      responses:
        "200":
          description: Servidor operativo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # NOTA: excluir este endpoint del spec/despliegue de producción.
  /debug/force-error:
    get:
      tags: [Debug]
      summary: Fuerza un error (solo development)
      security: [] # CAMBIO(4): se marca explícitamente como endpoint público
      responses:
        "500":
          description: Error interno simulado

  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión con Firebase
      # CAMBIO(2): OpenAPI ignora los parámetros de header llamados
      # "Authorization"; se modela con el securityScheme FirebaseToken.
      # ORIGINAL:
      # parameters:
      #   - in: header
      #     name: Authorization
      #     required: true
      #     schema: { type: string }
      #     example: "Bearer <firebase_id_token>"
      security:
        - FirebaseToken: []
      responses:
        "200":
          description: Sesión iniciada, JWT en cookie httpOnly
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  user:
                    type: object
                    properties:
                      userId: { type: string }
                      name: { type: string }
                      email: { type: string }
                      role: { type: string }
        "400":
          description: Token no enviado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Token inválido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify:
    get:
      tags: [Auth]
      summary: Verificar sesión activa
      security: # CAMBIO(1): la verificación se hace contra la cookie de sesión
        - CookieAuth: []
      responses:
        "200":
          description: Sesión válida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión
      security: # CAMBIO(1): el logout limpia la cookie de sesión
        - CookieAuth: []
      responses:
        "200":
          description: Sesión cerrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # CAMBIO(7): las rutas reales del backend son /upload/ponente/imagen,
  # /upload/ponente/presentacion y /upload/documento, todas con verifyAdmin.
  # >> DISCUTIR: sincronizar el spec con src/routes/upload.route.js.
  /upload:
    post:
      tags: [Upload]
      summary: Subir archivo a Cloudinary
      security: # CAMBIO(7): en el backend está protegido (verifyAdmin); antes no declaraba security
        - BearerAuth: []
        - CookieAuth: [] # CAMBIO(1)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Archivo a subir (jpg, png, gif, pdf, ppt, doc, hasta 10MB)
      responses:
        "200":
          description: Archivo subido
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  file:
                    type: object
                    properties:
                      filename: { type: string }
                      originalname: { type: string }
                      path: { type: string }
                      size: { type: number }
                      mimetype: { type: string }
        "401": # CAMBIO(4)
          $ref: "#/components/responses/Unauthorized"

  # NOTA(8): en el backend estas rutas NO aplican hoy ningún middleware de
  # autenticación (src/routes/evento.routes.js) — ver nota de cabecera.
  /eventos:
    get:
      tags: [Eventos]
      summary: Listar/filtrar eventos
      security:
        - BearerAuth: []
        - CookieAuth: [] # CAMBIO(1)
      parameters:
        - in: query
          name: ciudad
          schema: { type: string }
        - in: query
          name: tipo_evento
          schema: { type: string }
        - in: query
          name: estado
          schema: { type: string }
      responses:
        "200":
          description: Lista de eventos
          content:
            application/json:
              schema:
                # CAMBIO(5) — ORIGINAL: $ref: "#/components/schemas/OkResponse"
                $ref: "#/components/schemas/EventoListResponse"
        "401": # CAMBIO(4)
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Eventos]
      summary: Crear evento
      security:
        - BearerAuth: []
        - CookieAuth: [] # CAMBIO(1)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre]
              properties:
                nombre: { type: string }
                # CAMBIO(5): campos según el modelo Prisma; antes solo "nombre".
                descripcion: { type: string }
                completado: { type: boolean }
                clienteId: { $ref: "#/components/schemas/UUID" }
      responses:
        # CAMBIO(3) — ORIGINAL: "200":
        "201":
          description: Evento creado
          content:
            application/json:
              schema:
                # CAMBIO(5) — ORIGINAL: $ref: "#/components/schemas/OkResponse"
                $ref: "#/components/schemas/EventoResponse"
        "400":
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401": # CAMBIO(4)
          $ref: "#/components/responses/Unauthorized"

  /eventos/{id}:
    get:
      tags: [Eventos]
      summary: Obtener evento por ID
      security:
        - BearerAuth: []
        - CookieAuth: [] # CAMBIO(1)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: Evento encontrado
          content:
            application/json:
              schema:
                # CAMBIO(5) — ORIGINAL: $ref: "#/components/schemas/OkResponse"
                $ref: "#/components/schemas/EventoResponse"
        "401": # CAMBIO(4)
          $ref: "#/components/responses/Unauthorized"
        "404": # CAMBIO(4)
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Eventos]
      summary: Actualizar evento
      security:
        - BearerAuth: []
        - CookieAuth: [] # CAMBIO(1)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      # CAMBIO(5): faltaba el requestBody del PATCH (no se documentaba qué campos acepta).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre: { type: string }
                descripcion: { type: string }
                completado: { type: boolean }
                clienteId: { $ref: "#/components/schemas/UUID" }
      responses:
        "200":
          description: Evento actualizado
          content:
            application/json:
              schema:
                # CAMBIO(5) — ORIGINAL: $ref: "#/components/schemas/OkResponse"
                $ref: "#/components/schemas/EventoResponse"
        "401": # CAMBIO(4)
          $ref: "#/components/responses/Unauthorized"
        "404": # CAMBIO(4)
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Eventos]
      summary: Eliminar evento
      security:
        - BearerAuth: []
        - CookieAuth: [] # CAMBIO(1)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: Evento eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401": # CAMBIO(4)
          $ref: "#/components/responses/Unauthorized"
        "404": # CAMBIO(4)
          $ref: "#/components/responses/NotFound"

  # NOTA(8): igual que eventos, sin middleware de auth en el backend hoy.
  /clientes:
    get:
      tags: [Clientes]
      summary: Listar/filtrar clientes
      security:
        - BearerAuth: []
        - CookieAuth: [] # CAMBIO(1)
      parameters:
        - in: query
          name: sector
          schema: { type: string }
        - in: query
          name: ciudad
          schema: { type: string }
      responses:
        "200":
          description: Lista de clientes
          content:
            application/json:
              schema:
                # CAMBIO(5) — ORIGINAL: $ref: "#/components/schemas/OkResponse"
                $ref: "#/components/schemas/ClienteListResponse"
        "401": # CAMBIO(4)
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Clientes]
      summary: Crear cliente
      security:
        - BearerAuth: []
        - CookieAuth: [] # CAMBIO(1)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre, correo]
              properties:
                nombre: { type: string }
                correo: { type: string, format: email }
      responses:
        # CAMBIO(3) — ORIGINAL: "200":
        "201":
          description: Cliente creado
          content:
            application/json:
              schema:
                # CAMBIO(5) — ORIGINAL: $ref: "#/components/schemas/OkResponse"
                $ref: "#/components/schemas/ClienteResponse"
        "400": # CAMBIO(4): faltaba (el POST valida nombre y correo)
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401": # CAMBIO(4)
          $ref: "#/components/responses/Unauthorized"

  /clientes/{id}:
    get:
      tags: [Clientes]
      summary: Obtener cliente por ID
      security:
        - BearerAuth: []
        - CookieAuth: [] # CAMBIO(1)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: Cliente encontrado
          content: # CAMBIO(6): faltaba el content de la respuesta
            application/json:
              schema:
                $ref: "#/components/schemas/ClienteResponse"
        "401": # CAMBIO(4)
          $ref: "#/components/responses/Unauthorized"
        "404": # CAMBIO(4)
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Clientes]
      summary: Actualizar cliente
      security:
        - BearerAuth: []
        - CookieAuth: [] # CAMBIO(1)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      # CAMBIO(5): faltaba el requestBody del PATCH.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre: { type: string }
                correo: { type: string, format: email }
      responses:
        "200":
          description: Cliente actualizado
          content: # CAMBIO(6): faltaba el content de la respuesta
            application/json:
              schema:
                $ref: "#/components/schemas/ClienteResponse"
        "401": # CAMBIO(4)
          $ref: "#/components/responses/Unauthorized"
        "404": # CAMBIO(4)
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Clientes]
      summary: Eliminar cliente
      security:
        - BearerAuth: []
        - CookieAuth: [] # CAMBIO(1)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "200":
          description: Cliente eliminado
          content: # CAMBIO(6): faltaba el content de la respuesta
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401": # CAMBIO(4)
          $ref: "#/components/responses/Unauthorized"
        "404": # CAMBIO(4)
          $ref: "#/components/responses/NotFound"

  # NOTA CAMBIO(5): "Espacios" todavía no existe en el backend (ni modelo
  # Prisma ni ruta); las respuestas usan el OkResponse genérico hasta entonces.
  /espacios:
    get:
      tags: [Espacios]
      summary: Listar/filtrar espacios
      security:
        - BearerAuth: []
        - CookieAuth: [] # CAMBIO(1)
